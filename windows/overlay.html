<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cue Overlay</title>
  <style>
    :root {
      --bg: rgba(0, 0, 0, 0.55);
      --bg-handle: rgba(255, 255, 255, 0.08);
      --bg-handle-hover: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --text-shadow: 0 1px 6px rgba(0, 0, 0, 0.8);
      --empty-text: rgba(255, 255, 255, 0.45);
      --image-bg: rgba(0, 0, 0, 0.25);
      --image-border: rgba(255, 255, 255, 0.1);
      --image-shadow: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
      --progress-track: rgba(255, 255, 255, 0.08);
      --progress-fill: rgba(255, 255, 255, 0.3);
      --accent: #e8ff47;
      --stop-color: #ff6868;
      --pause-color: #ffd44a;
      --reading-line: rgba(232, 255, 71, 0.18);
    }

    body.theme-light {
      --bg: rgba(245, 245, 245, 0.88);
      --bg-handle: rgba(0, 0, 0, 0.1);
      --bg-handle-hover: rgba(0, 0, 0, 0.22);
      --text: #0d0d0f;
      --text-shadow: 0 1px 4px rgba(255, 255, 255, 0.85);
      --empty-text: rgba(13, 13, 15, 0.45);
      --image-bg: rgba(255, 255, 255, 0.5);
      --image-border: rgba(0, 0, 0, 0.12);
      --image-shadow: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.25));
      --progress-track: rgba(0, 0, 0, 0.1);
      --progress-fill: rgba(0, 0, 0, 0.35);
      --accent: #6a7a18;
      --reading-line: rgba(106, 122, 24, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Georgia', serif;
      color: var(--text);
    }

    #shell {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      border-radius: 6px;
      overflow: hidden;
      transition: background 200ms ease;
    }

    #handle {
      flex: 0 0 8px;
      width: 100%;
      background: var(--bg-handle);
      cursor: grab;
      transition: background 120ms ease, flex-basis 120ms ease;
      -webkit-app-region: drag;
    }

    #handle:hover {
      background: var(--bg-handle-hover);
      flex-basis: 14px;
    }

    #handle:active {
      cursor: grabbing;
    }

    #body {
      flex: 1 1 auto;
      display: flex;
      flex-direction: row;
      min-height: 0;
    }

    #image-panel {
      flex: 0 0 0;
      width: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: flex-basis 200ms ease, width 200ms ease, background 200ms ease;
      border-right: 0px solid var(--image-border);
      background: var(--image-bg);
    }

    #image-panel.visible {
      flex: 0 0 28%;
      width: 28%;
      border-right-width: 1px;
      padding: 12px;
    }

    #image-el {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      filter: var(--image-shadow);
    }

    #scroll-viewport {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      padding: 24px 48px;
      min-width: 0;
    }

    /* faint horizontal band at the reading line — top of viewport */
    #reading-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 24px;
      height: 2px;
      background: var(--reading-line);
      opacity: 0;
      transition: opacity 200ms ease;
      pointer-events: none;
    }

    #reading-line.show {
      opacity: 1;
    }

    #text {
      position: relative;
      will-change: transform;
      transform: translateY(0px);
      font-size: 32px;
      line-height: 1.45;
      letter-spacing: 0.01em;
      color: var(--text);
      text-shadow: var(--text-shadow);
      white-space: pre-wrap;
      word-wrap: break-word;
      transition: color 200ms ease;
    }

    body.mirror-h #text { transform-origin: center; }
    body.mirror-h #scroll-viewport { transform: scaleX(-1); transform-origin: center; }
    body.mirror-v #scroll-viewport { transform: scaleY(-1); transform-origin: center; }
    body.mirror-h.mirror-v #scroll-viewport { transform: scale(-1, -1); }

    #text.empty {
      color: var(--empty-text);
      font-style: italic;
    }

    .cue-anchor {
      display: inline;
      width: 0;
      height: 0;
      visibility: hidden;
      font-size: 0;
      line-height: 0;
    }

    .cue-emphasis {
      color: var(--accent);
      text-shadow: 0 0 12px currentColor, var(--text-shadow);
    }

    .prompt-word {
      border-radius: 3px;
      transition: background 120ms ease, color 120ms ease, text-shadow 120ms ease;
    }

    .prompt-word.heard {
      color: var(--accent);
      background: rgba(232, 255, 71, 0.12);
      text-shadow: 0 0 10px rgba(232, 255, 71, 0.35), var(--text-shadow);
    }

    .prompt-word.current {
      background: rgba(232, 255, 71, 0.28);
    }

    body.theme-light .prompt-word.heard {
      background: rgba(106, 122, 24, 0.14);
      text-shadow: 0 0 8px rgba(106, 122, 24, 0.18), var(--text-shadow);
    }

    #end-marker {
      display: inline-block;
      margin-top: 24px;
      opacity: 0;
      transition: opacity 400ms ease;
      color: var(--accent);
      font-family: 'JetBrains Mono', 'Menlo', monospace;
      font-size: 0.6em;
      letter-spacing: 0.1em;
    }

    #end-marker.show {
      opacity: 1;
    }

    #progress-track {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--progress-track);
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--progress-fill);
      transition: width 80ms linear;
    }

    /* progress-track chapter ticks */
    #progress-track .tick {
      position: absolute;
      top: -2px;
      width: 2px;
      height: 6px;
      background: var(--accent);
      opacity: 0.6;
    }

    /* corner overlays for cue events */
    .badge {
      position: absolute;
      pointer-events: none;
      font-family: 'JetBrains Mono', 'Menlo', monospace;
      font-weight: 700;
      letter-spacing: 0.14em;
      padding: 8px 14px;
      border-radius: 4px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .badge.show {
      opacity: 1;
      transform: translateY(0);
    }

    #reaction-badge {
      top: 14px;
      right: 14px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #reaction-badge .glyph { font-size: 28px; }
    #reaction-badge .label { font-size: 11px; }

    body.theme-light #reaction-badge {
      background: rgba(255, 255, 255, 0.85);
    }

    #status-badge {
      top: 14px;
      left: 14px;
      background: rgba(0, 0, 0, 0.55);
      color: var(--pause-color);
      border: 1px solid var(--pause-color);
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-badge.kind-stop {
      color: var(--stop-color);
      border-color: var(--stop-color);
    }

    #status-badge.kind-pause-timed {
      color: var(--pause-color);
    }

    body.theme-light #status-badge {
      background: rgba(255, 255, 255, 0.85);
    }

    #chapter-badge {
      bottom: 14px;
      right: 14px;
      background: rgba(0, 0, 0, 0.55);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 10px;
      max-width: 50%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    body.theme-light #chapter-badge {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(0, 0, 0, 0.15);
    }

    /* countdown overlay */
    #countdown {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      font-size: 96px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 50;
    }

    #countdown.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="shell">
    <div id="handle" title="Drag to reposition"></div>
    <div id="body">
      <div id="image-panel"><img id="image-el" alt="" /></div>
      <div id="scroll-viewport">
        <div id="reading-line"></div>
        <div id="text" class="empty">Waiting for script… open the Cue control panel and paste your script.<span id="end-marker">✓ END</span></div>
        <div id="reaction-badge" class="badge"><span class="glyph">🙂</span><span class="label">REACT</span></div>
        <div id="status-badge" class="badge"><span class="dot">⏸</span><span class="label">PAUSED</span></div>
        <div id="chapter-badge" class="badge">—</div>
        <div id="countdown"></div>
      </div>
    </div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
  <script src="../lib/script-parse.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
